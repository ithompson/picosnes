actions:
  # Special
  nop: "nop"
  dispatch: "dispatch(rd_val)"
  set_p: "P = rd_val"
  dec_s: "S -= 1"

  # PC setters
  set_pc_lo: "PC.lo = rd_val"
  set_pc_hi: "PC.hi = rd_val"
  set_pc_full: "PC.hi = rd_val, PC.lo = tmp.lo"
  set_pc_lo_inc_tmp: "PC.lo = rd_val, tmp.lo += 1"

  # Special ops for branches
  advance_pc_by_dat_stop_if_no_carry: "PC.lo signed+= dat, dat = carry, done if no carry"
  carry_into_pc_hi: "PC.hi += dat"

  # Mnemonic op invocations
  invoke_op: "op()"
  invoke_op_a: "op(A)"
  invoke_op_dat: "op(dat)"
  invoke_op_rd_val: "op(rd_val)"

  # Basic TMP setters
  set_tmp_lo: "tmp.lo = rd_val"
  set_tmp_hi: "tmp.hi = rd_val"
  set_tmp_full: "tmp.hi = rd_val, tmp.lo = dat"
  set_tmp_zp: "tmp.lo = rd_val, tmp.hi = 0"

  # Fused tmp set and write cycle
  set_tmp_hi_invoke_op_dat: "tmp.hi = rd_val, op(dat)"
  set_tmp_zp_invoke_op_dat: "tmp.lo = rd_val, tmp.hi = 0, op(dat)"
  set_tmp_full_invoke_op_dat: "tmp.hi = rd_val, tmp.lo = dat, op(dat)"

  # Indirect access mode support
  set_tmp_hi_inc_by_x_record_carry: "tmp.hi = rd_val, tmp.lo += X, dat = carry"
  set_tmp_hi_inc_by_x_skip_if_no_carry: "tmp.hi = rd_val, tmp.lo += X, skip next if no carry"
  set_tmp_hi_inc_by_y_record_carry: "tmp.hi = rd_val, tmp.lo += Y, dat = carry"
  set_tmp_hi_inc_by_y_skip_if_no_carry: "tmp.hi = rd_val, tmp.lo += Y, skip next if no carry"
  set_tmp_full_inc_by_y_record_carry: "tmp.hi = rd_val, tmp.lo = dat + Y, dat = carry"
  set_tmp_full_inc_by_y_skip_if_no_carry: "tmp.hi = rd_val, tmp.lo = dat + Y, skip next if no carry"
  inc_tmp_hi: "tmp.hi += 1"
  carry_into_tmp_hi: "tmp.hi += dat"
  carry_into_tmp_hi_invoke_op_dat: "tmp.hi += dat, op(dat)"
  carry_into_tmp_hi_glitch_with_x: "local_tmp = dat; dat = X & (tmp.hi + 1); if local_tmp tmp.hi = dat"
  carry_into_tmp_hi_glitch_with_y: "local_tmp = dat; dat = Y & (tmp.hi + 1); if local_tmp tmp.hi = dat"

  # ZPX/ZPY access mode support
  inc_tmp_by_x: "tmp.lo += X"
  inc_tmp_by_x_invoke_op_dat: "tmp.lo += X, op(dat)"
  inc_tmp_by_y: "tmp.lo += Y"
  inc_tmp_by_y_invoke_op_dat: "tmp.lo += Y, op(dat)"

  # DAT setters, for write operations
  save_pc_hi: "dat = PC.hi"
  save_pc_lo: "dat = PC.lo"
  save_rd_val: "dat = rd_val"
  save_p: "dat = P"
  save_p_brk: "dat = P+B"
  save_rd_val_stop_if_no_branch: "dat = rd_val, done if branch not taken"
  save_rd_val_inc_tmp: "dat = rd_val, tmp.lo += 1"

  # Interrupt/Reset/BRK handling
  set_reset_vec: "tmp.hi = 0xFF, tmp.lo = 0xFC, P.I = 1"
  set_irq_vec: "tmp.hi = 0xFF, tmp.lo = 0xFE, P.I = 1"
  set_nmi_vec: "tmp.hi = 0xFF, tmp.lo = 0xFA, P.I = 1"

dispatch_seq:
  - [ dispatch, inc_read_pc ]

reset_seq:
  - [ dec_s, read_stk ]
  - [ dec_s, read_stk ]
  - [ dec_s, read_stk ]
  - [ set_reset_vec, read_tmp ]
  - [ set_pc_lo_inc_tmp, read_tmp ]
  - [ set_pc_hi, read_pc ]

irq_seq:
  - [ save_pc_hi, inc_push_stk ]
  - [ save_pc_lo, push_stk ]
  - [ save_p, push_stk ]
  - [ set_irq_vec, read_tmp ]
  - [ set_pc_lo_inc_tmp, read_tmp ]
  - [ set_pc_hi, read_pc ]

nmi_seq:
  - [ save_pc_hi, inc_push_stk ]
  - [ save_pc_lo, push_stk ]
  - [ save_p, push_stk ]
  - [ set_nmi_vec, read_tmp ]
  - [ set_pc_lo_inc_tmp, read_tmp ]
  - [ set_pc_hi, read_pc ]

access_modes:
  ABS:
    inst_arg: $addr
    sequences:
      JMP:
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_pc_full, read_pc ]
      JSR:
        - [ set_tmp_lo, inc_read_stk ]
        - [ save_pc_hi, push_stk ]
        - [ save_pc_lo, push_stk ]
        - [ nop, read_pc ]
        - [ set_pc_full, read_pc ]
      RMW:
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_tmp_hi, inc_read_tmp ]
        - [ save_rd_val, write_tmp ]
        - [ invoke_op_dat, write_tmp ]
        - [ nop, read_pc ]
      Read:
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_tmp_hi, inc_read_tmp ]
        - [ invoke_op_rd_val, read_pc ]
      Write:
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_tmp_hi_invoke_op_dat, inc_write_tmp ]
        - [ nop, read_pc ]
      Nomem:
        # Illegal instructions only
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_tmp_hi, inc_read_tmp ]
        - [ invoke_op, read_pc ]
  ABSIND:
    inst_arg: ($addr)
    sequences:
      JMP:
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_tmp_hi, inc_read_tmp ]
        - [ set_pc_lo_inc_tmp, read_tmp ]
        - [ set_pc_hi, read_pc ]
  ABSX:
    inst_arg: $addr,X
    sequences:
      RMW:
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_tmp_hi_inc_by_x_record_carry, inc_read_tmp ]
        - [ carry_into_tmp_hi, read_tmp ]
        - [ save_rd_val, write_tmp ]
        - [ invoke_op_dat, write_tmp ]
        - [ nop, read_pc ]
      Read:
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_tmp_hi_inc_by_x_skip_if_no_carry, inc_read_tmp ]
        - [ inc_tmp_hi, read_tmp ]
        - [ invoke_op_rd_val, read_pc ]
      Write:
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_tmp_hi_inc_by_x_record_carry, inc_read_pc ]
        - [ carry_into_tmp_hi_invoke_op_dat, write_tmp ]
        - [ nop, read_pc ]
      Nomem:
        # Illegal instructions only
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_tmp_hi_inc_by_x_skip_if_no_carry, inc_read_tmp ]
        - [ inc_tmp_hi, read_tmp ]
        - [ invoke_op, read_pc ]
      WriteGlitchY:
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_tmp_hi_inc_by_x_record_carry, inc_read_pc ]
        - [ carry_into_tmp_hi_glitch_with_y, write_tmp ]
        - [ nop, read_pc ]
  ABSY:
    inst_arg: $addr,Y
    sequences:
      RMW:
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_tmp_hi_inc_by_y_record_carry, inc_read_tmp ]
        - [ carry_into_tmp_hi, read_tmp ]
        - [ save_rd_val, write_tmp ]
        - [ invoke_op_dat, write_tmp ]
        - [ nop, read_pc ]
      Read:
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_tmp_hi_inc_by_y_skip_if_no_carry, inc_read_tmp ]
        - [ inc_tmp_hi, read_tmp ]
        - [ invoke_op_rd_val, read_pc ]
      Write:
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_tmp_hi_inc_by_y_record_carry, inc_read_pc ]
        - [ carry_into_tmp_hi_invoke_op_dat, write_tmp ]
        - [ nop, read_pc ]
      WriteGlitchX:
        - [ set_tmp_lo, inc_read_pc ]
        - [ set_tmp_hi_inc_by_y_record_carry, inc_read_pc ]
        - [ carry_into_tmp_hi_glitch_with_x, write_tmp ]
        - [ nop, read_pc ]
  ACC:
    inst_arg: A
    sequences:
      RMW:
        - [ invoke_op_a, read_pc ]
  IMM:
    inst_arg: "#imm"
    sequences:
      Read:
        - [ invoke_op_rd_val, inc_read_pc ]
      Nomem:
        # Illegal instructions only
        - [ invoke_op, inc_read_pc ]
  IMP:
    inst_arg: ""
    sequences:
      BRK:
        - [ save_pc_hi, inc_push_stk ]
        - [ save_pc_lo, push_stk ]
        - [ save_p_brk, push_stk ]
        - [ set_irq_vec, read_tmp ]
        - [ set_pc_lo_inc_tmp, read_tmp ]
        - [ set_pc_hi, read_pc ]
      Nomem:
        - [ invoke_op, read_pc ]
      Pop:
        - [ nop, read_stk ]
        - [ nop, pop_stk ]
        - [ invoke_op_rd_val, read_pc ]
      Push:
        - [ invoke_op_dat, push_stk ]
        - [ nop, read_pc ]
      RTI:
        - [ nop, read_stk ]
        - [ nop, pop_stk ]
        - [ set_p, pop_stk ]
        - [ set_pc_lo, pop_stk ]
        - [ set_pc_hi, read_pc ]
      RTS:
        - [ nop, read_stk ]
        - [ nop, pop_stk ]
        - [ set_pc_lo, pop_stk ]
        - [ set_pc_hi, read_pc ]
        - [ nop, inc_read_pc ]
  INDX:
    inst_arg: ($zp,X)
    sequences:
      RMW:
        - [ set_tmp_zp, inc_read_tmp ]
        - [ inc_tmp_by_x, read_tmp ]
        - [ save_rd_val_inc_tmp, read_tmp ]
        - [ set_tmp_full, read_tmp ]
        - [ save_rd_val, write_tmp ]
        - [ invoke_op_dat, write_tmp ]
        - [ nop, read_pc ]
      Read:
        - [ set_tmp_zp, inc_read_tmp ]
        - [ inc_tmp_by_x, read_tmp ]
        - [ save_rd_val_inc_tmp, read_tmp ]
        - [ set_tmp_full, read_tmp ]
        - [ invoke_op_rd_val, read_pc ]
      Write:
        - [ set_tmp_zp, inc_read_tmp ]
        - [ inc_tmp_by_x, read_tmp ]
        - [ save_rd_val_inc_tmp, read_tmp ]
        - [ set_tmp_full_invoke_op_dat, write_tmp ]
        - [ nop, read_pc ]
  INDY:
    inst_arg: ($zp),Y
    sequences:
      RMW:
        - [ set_tmp_zp, inc_read_tmp ]
        - [ save_rd_val_inc_tmp, read_tmp ]
        - [ set_tmp_full_inc_by_y_record_carry, read_tmp ]
        - [ carry_into_tmp_hi, read_tmp ]
        - [ save_rd_val, write_tmp ]
        - [ invoke_op_dat, write_tmp ]
        - [ nop, read_pc ]
      Read:
        - [ set_tmp_zp, inc_read_tmp ]
        - [ save_rd_val_inc_tmp, read_tmp ]
        - [ set_tmp_full_inc_by_y_skip_if_no_carry, read_tmp ]
        - [ inc_tmp_hi, read_tmp ]
        - [ invoke_op_rd_val, read_pc ]
      Write:
        - [ set_tmp_zp, inc_read_tmp ]
        - [ save_rd_val_inc_tmp, read_tmp ]
        - [ set_tmp_full_inc_by_y_record_carry, read_tmp ]
        - [ carry_into_tmp_hi_invoke_op_dat, write_tmp ]
        - [ nop, read_pc ]
  REL:
    inst_arg: label
    sequences:
      Branch:
        - [ save_rd_val_stop_if_no_branch, inc_read_pc ]
        - [ advance_pc_by_dat_stop_if_no_carry, read_pc ]
        - [ carry_into_pc_hi, read_pc ]
  ZP:
    inst_arg: $zp
    sequences:
      RMW:
        - [ set_tmp_zp, inc_read_tmp ]
        - [ save_rd_val, write_tmp ]
        - [ invoke_op_dat, write_tmp ]
        - [ nop, read_pc ]
      Read:
        - [ set_tmp_zp, inc_read_tmp ]
        - [ invoke_op_rd_val, read_pc ]
      Write:
        - [ set_tmp_zp_invoke_op_dat, inc_write_tmp ]
        - [ nop, read_pc ]
      Nomem:
        # Illegal instructions only
        - [ set_tmp_zp, inc_read_tmp ]
        - [ invoke_op, read_pc ]
  ZPX:
    inst_arg: $zp,X
    sequences:
      RMW:
        - [ set_tmp_zp, inc_read_tmp ]
        - [ inc_tmp_by_x, read_tmp ]
        - [ save_rd_val, write_tmp ]
        - [ invoke_op_dat, write_tmp ]
        - [ nop, read_pc ]
      Read:
        - [ set_tmp_zp, inc_read_tmp ]
        - [ inc_tmp_by_x, read_tmp ]
        - [ invoke_op_rd_val, read_pc ]
      Write:
        - [ set_tmp_zp, inc_read_tmp ]
        - [ inc_tmp_by_x_invoke_op_dat, write_tmp ]
        - [ nop, read_pc ]
      Nomem:
        # Illegal instructions only
        - [ set_tmp_zp, inc_read_tmp ]
        - [ inc_tmp_by_x, read_tmp ]
        - [ invoke_op, read_pc ]
  ZPY:
    inst_arg: $zp,Y
    sequences:
      Read:
        - [ set_tmp_zp, inc_read_tmp ]
        - [ inc_tmp_by_y, read_tmp ]
        - [ invoke_op_rd_val, read_pc ]
      Write:
        - [ set_tmp_zp, inc_read_tmp ]
        - [ inc_tmp_by_y_invoke_op_dat, write_tmp ]
        - [ nop, read_pc ]

mnemonics:
  ADC:
    description: "Add with carry"
    access_subtype: Read
    op: "A += {reg} + C"
    flags: "NZCV = ALU"
  AND:
    description: "AND (with accumulator)"
    access_subtype: Read
    op: "A &= {reg}"
    flags: "NZ = ALU"
  ASL:
    description: "Arithmetic shift left"
    access_subtype: RMW
    op: "{reg} <<= 1"
    flags: "NZC = ALU"
  BCC:
    description: "Branch on carry clear"
    access_subtype: Branch
    branch_cond: P.C == 0
  BCS:
    description: "Branch on carry set"
    access_subtype: Branch
    branch_cond: P.C == 1
  BEQ:
    description: "Branch on equal (zero set)"
    access_subtype: Branch
    branch_cond: P.Z == 1
  BIT:
    description: "Bit test"
    access_subtype: Read
    op: "A & {reg}"
    flags: "Z = ALU, N = M7, V = M6"
  BMI:
    description: "Branch on minus (negative set)"
    access_subtype: Branch
    branch_cond: P.N == 1
  BNE:
    description: "Branch on not equal (zero clear)"
    access_subtype: Branch
    branch_cond: P.Z == 0
  BPL:
    description: "Branch on plus (positive set)"
    access_subtype: Branch
    branch_cond: P.N == 0
  BRK:
    description: "Break / interrupt"
    access_subtype: BRK
  BVC:
    description: "Branch on overflow clear"
    access_subtype: Branch
    branch_cond: P.V == 0
  BVS:
    description: "Branch on overflow set"
    access_subtype: Branch
    branch_cond: P.V == 1
  CLC:
    description: "Clear carry"
    access_subtype: Nomem
    op: "P.C = 0"
  CLD:
    description: "Clear decimal"
    access_subtype: Nomem
    op: "P.D = 0"
  CLI:
    description: "Clear interrupt disable"
    access_subtype: Nomem
    op: "P.I = 0"
  CLV:
    description: "Clear overflow"
    access_subtype: Nomem
    op: "P.V = 0"
  CMP:
    description: "Compare with accumulator"
    access_subtype: Read
    op: "A - {reg}"
    flags: "NZC = ALU"
  CPX:
    description: "Compare with X"
    access_subtype: Read
    op: "X - {reg}"
    flags: "NZC = ALU"
  CPY:
    description: "Compare with Y"
    access_subtype: Read
    op: "Y - {reg}"
    flags: "NZC = ALU"
  DEC:
    description: "Decrement"
    access_subtype: RMW
    op: "{reg} -= 1"
    flags: "NZ = ALU"
  DEX:
    description: "Decrement X"
    access_subtype: Nomem
    op: "X -= 1"
    flags: "NZ = ALU"
  DEY:
    description: "Decrement Y"
    access_subtype: Nomem
    op: "Y -= 1"
    flags: "NZ = ALU"
  EOR:
    description: "Exclusive OR (with accumulator)"
    access_subtype: Read
    op: "A ^= {reg}"
    flags: "NZ = ALU"
  INC:
    description: "Increment"
    access_subtype: RMW
    op: "{reg} += 1"
    flags: "NZ = ALU"
  INX:
    description: "Increment X"
    access_subtype: Nomem
    op: "X += 1"
    flags: "NZ = ALU"
  INY:
    description: "Increment Y"
    access_subtype: Nomem
    op: "Y += 1"
    flags: "NZ = ALU"
  JMP:
    description: "Jump"
    access_subtype: JMP
  JSR:
    description: "Jump to subroutine"
    access_subtype: JSR
  LDA:
    description: "Load accumulator"
    access_subtype: Read
    op: "A = {reg}"
    flags: "NZ = ALU"
  LDX:
    description: "Load X"
    access_subtype: Read
    op: "X = {reg}"
    flags: "NZ = ALU"
  LDY:
    description: "Load Y"
    access_subtype: Read
    op: "Y = {reg}"
    flags: "NZ = ALU"
  LSR:
    description: "Logical shift right"
    access_subtype: RMW
    op: "{reg} >>= 1"
    flags: "N = 0, ZC = ALU"
  NOP:
    description: "No operation"
    access_subtype: Nomem
    op: "nop"
  ORA:
    description: "Logical OR with accumulator"
    access_subtype: Read
    op: "A |= {reg}"
    flags: "NZ = ALU"
  PHA:
    description: "Push accumulator"
    access_subtype: Push
    op: "{reg} = A"
  PHP:
    description: "Push processor status"
    access_subtype: Push
    op: "{reg} = P"
  PLA:
    description: "Pull accumulator"
    access_subtype: Pop
    op: "A = {reg}"
    flags: "NZ = ALU"
  PLP:
    description: "Pull processor status"
    access_subtype: Pop
    op: "{reg} = P"
  ROL:
    description: "Rotate left"
    access_subtype: RMW
    op: "{reg} ROL= 1"
    flags: "NZ = ALU, C = {reg}7"
  ROR:
    description: "Rotate right"
    access_subtype: RMW
    op: "{reg} ROR= 1"
    flags: "NZ = ALU, C = {reg}0"
  RTI:
    description: "Return from interrupt"
    access_subtype: RTI
  RTS:
    description: "Return from subroutine"
    access_subtype: RTS
  SBC:
    description: "Subtract with carry"
    access_subtype: Read
    op: "A += ~{reg} + C"
    flags: "NZCV = ALU"
  SEC:
    description: "Set carry"
    access_subtype: Nomem
    op: "P.C = 1"
  SED:
    description: "Set decimal mode"
    access_subtype: Nomem
    op: "P.D = 1"
  SEI:
    description: "Set interrupt disable"
    access_subtype: Nomem
    op: "P.I = 1"
  STA:
    description: "Store accumulator"
    access_subtype: Write
    op: "{reg} = A"
  STX:
    description: "Store X"
    access_subtype: Write
    op: "{reg} = X"
  STY:
    description: "Store Y"
    access_subtype: Write
    op: "{reg} = Y"
  TAX:
    description: "Transfer accumulator to X"
    access_subtype: Nomem
    op: "X = A"
    flags: "NZ = ALU"
  TAY:
    description: "Transfer accumulator to Y"
    access_subtype: Nomem
    op: "Y = A"
    flags: "NZ = ALU"
  TSX:
    description: "Transfer stack pointer to X"
    access_subtype: Nomem
    op: "X = S"
    flags: "NZ = ALU"
  TXA:
    description: "Transfer X to accumulator"
    access_subtype: Nomem
    op: "A = X"
    flags: "NZ = ALU"
  TXS:
    description: "Transfer X to stack pointer"
    access_subtype: Nomem
    op: "S = X"
  TYA:
    description: "Transfer Y to accumulator"
    access_subtype: Nomem
    op: "A = Y"
    flags: "NZ = ALU"
  # Illegal mnemonics follow
  ALR:
    description: "AND with immediate and LSR"
    access_subtype: Read
    op: "A &= {reg}; A >>= 1"
    flags: "NZC = ALU"
    illegal: true
  ANE:
    description: "OR ??? and AND imm; UNSTABLE"
    access_subtype: Read
    op: "A = X & {reg}"
    flags: "NZ = ALU"
    illegal: true
  ARR:
    description: "Combined AND and ROR"
    access_subtype: Read
    op: "A &= {reg}; A ROR= 1"
    flags: "NZCV = ALU"
    illegal: true
  ANC:
    description: "AND operator, set C as if ASL"
    access_subtype: Read
    op: "A &= {reg}"
    flags: "NZ = ALU; C = A7"
    illegal: true
  DCP:
    description: "Combined DEC and CMP"
    access_subtype: RMW
    op: "{reg} -= 1; A - {reg}"
    flags: "NZC = ALU"
  ISC:
    description: "Combined INC and SBC"
    access_subtype: RMW
    op: "{reg} += 1; A += ~{reg} + C"
    flags: "NZCV = ALU"
  LAS:
    description: "Combined LDA and TSX"
    access_subtype: Read
    op: "A, X, S = {reg} & S"
    flags: "NZ = ALU"
    illegal: true
  LAX:
    description: "Load A and X"
    access_subtype: Read
    op: "A = {reg}, X = A"
    flags: "NZ = ALU"
    illegal: true
  RLA:
    description: "Combined ROL and AND"
    access_subtype: RMW
    op: "{reg} ROL= 1; A = A & {reg}"
    flags: "NZC = ALU"
    illegal: true
  RRA:
    description: "Combined ROR and ADC"
    access_subtype: RMW
    op: "{reg} ROR= 1; A += {reg} + C"
    flags: "NZCV = ALU"
    illegal: true
  SAX:
    description: "Store A & X"
    access_subtype: Write
    op: "{reg} = A & X"
    illegal: true
  SBX:
    description: "Combined CMP and DEX"
    access_subtype: Read
    op: "X = (A & X) - {reg}"
    flags: "NZC = ALU"
  SHA:
    description: "Store A & X & (ADDR_HI+1); UNSTABLE"
    access_subtype: Write
    op: "{reg} = A & X & (ADDR_HI+1)"
    illegal: true
  SHY:
    description: "Store Y & (ADDR_HI+1); UNSTABLE"
    access_subtype: WriteGlitchY
    op_alias: NOP
    illegal: true
  SHX:
    description: "Store X & (ADDR_HI+1); UNSTABLE"
    access_subtype: WriteGlitchX
    op_alias: NOP
